<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;font-family:Inter,sans-serif;}
.wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.sw{border-radius:8px;height:92px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,.06);}
.n{font:700 10px/1 Inter;letter-spacing:.5px;}
.h{font:600 10px/1 'JetBrains Mono',monospace;opacity:.75;}
</style></head><body><div class="wrap">
  <div class="sw" style="background:#0a0a0a"><div class="n">bg</div><div class="h">#0a0a0a</div></div>
  <div class="sw" style="background:#0c0c0f"><div class="n">bg-tool</div><div class="h">#0c0c0f</div></div>
  <div class="sw" style="background:#13131a"><div class="n">surface</div><div class="h">#13131a</div></div>
  <div class="sw" style="background:#1f2937"><div class="n">gray-800</div><div class="h">#1f2937</div></div>
  <div class="sw" style="background:#374151"><div class="n">gray-700</div><div class="h">#374151</div></div>
  <div class="sw" style="background:#9ca3af;color:#0a0a0a"><div class="n">fg-muted</div><div class="h">#9ca3af</div></div>
</div></body></html>
