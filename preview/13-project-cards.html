<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:20px;font-family:Inter,sans-serif;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:rgba(17,24,39,.5);backdrop-filter:blur(8px);border:1px solid #1f2937;border-radius:16px;overflow:hidden;position:relative;}
.card.featured{border-color:rgba(30,64,175,.5);}
.badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:999px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);font:600 10px/1 Inter;z-index:2;}
.thumb{height:80px;background:linear-gradient(135deg,#1e293b,#0f172a);}
.body{padding:14px 16px;}
.title{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.title h4{margin:0;font:700 15px/1.2 Inter;}
.status{padding:2px 8px;border-radius:999px;font:600 10px/1 Inter;}
.live{background:rgba(20,83,45,.3);color:#4ade80;}
.demo{background:rgba(30,58,138,.3);color:#60a5fa;}
.desc{margin:0 0 8px;font:400 12px/1.45 Inter;color:#9ca3af;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:999px;font:500 10px/1.3 Inter;}
.tb{background:rgba(30,58,138,.3);color:#60a5fa;}
.tp{background:rgba(76,29,149,.3);color:#a78bfa;}
.tg{background:rgba(20,83,45,.3);color:#4ade80;}
</style></head><body><div class="grid">
<div class="card featured"><div class="badge">Featured</div><div class="thumb"></div><div class="body">
  <div class="title"><h4>Healthy AI Expert</h4><span class="status live">Live</span></div>
  <p class="desc">AI-powered wellness recommendations using NLP and machine learning.</p>
  <div class="tags"><span class="tag tb">Python</span><span class="tag tp">NLP</span><span class="tag tg">TensorFlow</span></div>
</div></div>
<div class="card"><div class="thumb" style="background:linear-gradient(135deg,#312e81,#1e1b4b)"></div><div class="body">
  <div class="title"><h4>Emotion Detection</h4><span class="status demo">Demo</span></div>
  <p class="desc">Deep learning model for facial keypoint detection using CNN and ResNet.</p>
  <div class="tags"><span class="tag tb">Python</span><span class="tag tp">CNN</span></div>
</div></div>
</div></body></html>
