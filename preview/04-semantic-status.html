<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;font-family:Inter,sans-serif;padding:24px;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:6px 14px;border-radius:999px;font:600 12px/1 Inter;}
.live{background:rgba(20,83,45,.3);color:#4ade80;}
.demo{background:rgba(30,58,138,.3);color:#60a5fa;}
.beta{background:rgba(113,63,18,.3);color:#facc15;}
.featured{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;}
.pinned{background:rgba(113,63,18,.3);color:#f5a623;border:1px solid #f5a623;}
.excluded{background:rgba(127,29,29,.3);color:#f75f5f;border:1px solid #f75f5f;}
.lbl{font:600 10px/1 Inter;letter-spacing:2px;text-transform:uppercase;color:#666680;margin-bottom:8px;}
</style></head><body>
<div class="lbl">Project status</div>
<div class="row"><span class="pill live">Live</span><span class="pill demo">Demo</span><span class="pill beta">Beta</span><span class="pill featured">Featured</span></div>
<div class="lbl">Admin states</div>
<div class="row"><span class="pill pinned">★ Pinned</span><span class="pill excluded">✕ Excluded</span></div>
</body></html>
