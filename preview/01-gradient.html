<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:#fff;font-family:var(--font-body);}
  .wrap{padding:20px;display:grid;gap:14px;}

  /* Hero band with gradient + stops */
  .hero{
    position:relative;border-radius:14px;overflow:hidden;
    background:linear-gradient(135deg,#3b82f6 0%,#6366f1 50%,#8b5cf6 100%);
    padding:22px 24px;min-height:120px;
    box-shadow:0 20px 60px -20px rgba(99,102,241,.55),0 0 0 1px rgba(255,255,255,.08) inset;
  }
  .hero::after{ /* subtle grain */
    content:"";position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;opacity:.18;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.6'/></svg>");
  }
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:relative;z-index:1;}
  .hero-title{font:900 24px/1.05 Inter;letter-spacing:-.02em;margin:0;}
  .hero-sub{font:500 12px/1.5 'JetBrains Mono',monospace;margin:6px 0 0;color:rgba(255,255,255,.82);letter-spacing:.02em;}
  .monogram{
    width:64px;height:64px;border-radius:14px;flex-shrink:0;
    background:rgba(0,0,0,.25);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;
    font:900 30px/1 Inter;letter-spacing:-1px;color:#fff;
  }

  /* Stops row */
  .stops{display:flex;gap:6px;margin-top:14px;position:relative;z-index:1;}
  .stop{flex:1;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;}
  .stop .chip{width:14px;height:14px;border-radius:4px;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.25) inset;}
  .stop .meta{display:flex;flex-direction:column;line-height:1.15;}
  .stop .hex{font:600 11px/1.2 'JetBrains Mono',monospace;color:#fff;}
  .stop .pct{font:500 10px/1.2 'JetBrains Mono',monospace;color:rgba(255,255,255,.7);}

  /* Usage showcase */
  .usage-grid{display:grid;grid-template-columns:1.25fr 1fr;gap:12px;}
  .panel{background:#0f0f14;border:1px solid #1f2937;border-radius:12px;padding:14px 16px;}
  .label{font:600 9px/1 'JetBrains Mono',monospace;letter-spacing:.22em;color:#6b7280;text-transform:uppercase;margin:0 0 10px;}

  .headline{font:900 30px/1.05 Inter;letter-spacing:-.025em;margin:0;}
  .headline .g{
    background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }

  .cta-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px;}
  .btn{
    position:relative;display:inline-flex;align-items:center;gap:6px;
    padding:10px 18px;border-radius:999px;border:0;cursor:pointer;
    font:700 13px/1 Inter;color:#fff;
    background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%);
  }
  .btn::before{
    content:"";position:absolute;inset:-3px;z-index:-1;border-radius:inherit;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);filter:blur(14px);opacity:.55;
  }
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:999px;
    font:700 10px/1 Inter;letter-spacing:.06em;color:#fff;text-transform:uppercase;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  }
  .badge .dot{width:5px;height:5px;border-radius:50%;background:#fff;}

  .mini{display:flex;flex-direction:column;gap:10px;}
  .bar{height:6px;border-radius:999px;background:#1f2937;overflow:hidden;}
  .bar > i{display:block;height:100%;width:72%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);}
  .pill{align-self:flex-start;padding:5px 12px;border-radius:999px;font:600 11px/1 Inter;color:#fff;background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
  .ring{
    width:44px;height:44px;border-radius:50%;
    background:
      conic-gradient(from 220deg,#3b82f6 0deg,#8b5cf6 260deg,#1f2937 260deg 360deg);
    display:grid;place-items:center;
  }
  .ring > span{width:32px;height:32px;border-radius:50%;background:#0f0f14;display:grid;place-items:center;font:800 11px/1 Inter;color:#fff;}

  .row{display:flex;align-items:center;gap:12px;}
</style></head><body>
<div class="wrap">

  <div class="hero">
    <div class="hero-top">
      <div>
        <h1 class="hero-title">Signature gradient</h1>
        <p class="hero-sub">135° · #3B82F6 → #8B5CF6 · blue-500 → violet-500</p>
      </div>
      <div class="monogram">AS</div>
    </div>
    <div class="stops">
      <div class="stop"><span class="chip" style="background:#3b82f6"></span><span class="meta"><span class="hex">#3B82F6</span><span class="pct">0% · start</span></span></div>
      <div class="stop"><span class="chip" style="background:#6366f1"></span><span class="meta"><span class="hex">#6366F1</span><span class="pct">50% · mid</span></span></div>
      <div class="stop"><span class="chip" style="background:#8b5cf6"></span><span class="meta"><span class="hex">#8B5CF6</span><span class="pct">100% · end</span></span></div>
    </div>
  </div>

  <div class="usage-grid">
    <div class="panel">
      <p class="label">In use</p>
      <p class="headline">Hi, I'm <span class="g">Aniket</span></p>
      <div class="cta-row" style="margin-top:14px;">
        <button class="btn">View Projects →</button>
        <span class="badge"><span class="dot"></span>Featured</span>
      </div>
    </div>

    <div class="panel">
      <p class="label">Accents</p>
      <div class="mini">
        <div class="row"><div class="ring"><span>72%</span></div><span style="font:600 12px/1.4 Inter;color:#9ca3af;">Progress ring</span></div>
        <div class="bar"><i></i></div>
        <span class="pill">Active filter</span>
      </div>
    </div>
  </div>

</div>
</body></html>
