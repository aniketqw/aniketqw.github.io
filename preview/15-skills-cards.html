<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:20px;font-family:Inter,sans-serif;}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:rgba(17,24,39,.3);backdrop-filter:blur(10px);border:1px solid #1f2937;border-radius:16px;padding:20px;}
.h{font:700 16px/1.2 Inter;margin:0 0 10px;}
.blue{color:#60a5fa;}.purple{color:#a78bfa;}.green{color:#4ade80;}
.row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:4px 10px;border-radius:999px;background:#1f2937;font:400 11px/1.2 Inter;}
</style></head><body><div class="wrap">
<div class="card"><h3 class="h blue">Languages</h3><div class="row"><span class="chip">Python</span><span class="chip">JavaScript</span><span class="chip">Java</span><span class="chip">C++</span></div></div>
<div class="card"><h3 class="h purple">AI/ML</h3><div class="row"><span class="chip">TensorFlow</span><span class="chip">PyTorch</span><span class="chip">NLP</span><span class="chip">Deep Learning</span></div></div>
</div></body></html>
