<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:24px;font-family:Inter,sans-serif;}
.wrap{display:flex;gap:14px;align-items:center;}
.mono{width:110px;height:110px;border-radius:16px;background:#0a0a0a;border:1px solid #1f2937;display:flex;align-items:center;justify-content:center;}
.as{font:900 56px/1 Inter;letter-spacing:-2px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.word{font:900 28px/1 Inter;letter-spacing:-1px;}
.word span{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.tag{font:600 10px/1 'JetBrains Mono',monospace;color:#9ca3af;margin-top:8px;}
</style></head><body>
<div class="wrap">
  <div style="display:flex;flex-direction:column;align-items:center"><div class="mono"><span class="as">AS</span></div><div class="tag">monogram</div></div>
  <div style="display:flex;flex-direction:column;align-items:flex-start;gap:10px">
    <div class="word">Aniket <span>Saxena</span></div>
    <div class="tag">wordmark — gradient on surname</div>
  </div>
</div>
</body></html>
