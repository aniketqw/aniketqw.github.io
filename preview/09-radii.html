<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:22px;font-family:Inter,sans-serif;}
.lbl{font:600 10px/1 Inter;letter-spacing:2px;text-transform:uppercase;color:#666680;margin-bottom:10px;}
.row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.box{display:flex;flex-direction:column;align-items:center;gap:6px;}
.r{background:#3b82f6;width:80px;}
.tag{font:600 10px/1 'JetBrains Mono',monospace;color:#9ca3af;}
</style></head><body>
<div class="lbl">Radii</div>
<div class="row">
  <div class="box"><div class="r" style="height:40px;border-radius:4px"></div><div class="tag">sm · 4</div></div>
  <div class="box"><div class="r" style="height:40px;border-radius:6px"></div><div class="tag">md · 6</div></div>
  <div class="box"><div class="r" style="height:40px;border-radius:8px"></div><div class="tag">lg · 8</div></div>
  <div class="box"><div class="r" style="height:40px;border-radius:10px"></div><div class="tag">xl · 10</div></div>
  <div class="box"><div class="r" style="height:40px;border-radius:16px"></div><div class="tag">2xl · 16</div></div>
  <div class="box"><div class="r" style="height:40px;border-radius:999px"></div><div class="tag">full</div></div>
</div>
</body></html>
