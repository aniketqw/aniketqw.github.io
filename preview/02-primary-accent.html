<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

  <div class="sw" style="background:#60a5fa;color:#0a0a0a"><div class="n">Link / Blue-400</div><div class="h">#60a5fa</div></div>

</div></body></html>
