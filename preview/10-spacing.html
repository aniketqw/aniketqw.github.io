<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:24px;font-family:Inter,sans-serif;}
.lbl{font:600 10px/1 Inter;letter-spacing:2px;text-transform:uppercase;color:#666680;margin-bottom:14px;}
.row{display:flex;gap:14px;align-items:flex-end;}
.box{display:flex;flex-direction:column;align-items:center;gap:6px;}
.sp{background:linear-gradient(180deg,#3b82f6,#8b5cf6);width:24px;}
.tag{font:600 10px/1 'JetBrains Mono',monospace;color:#9ca3af;}
</style></head><body>
<div class="lbl">Spacing scale (px)</div>
<div class="row">
  <div class="box"><div class="sp" style="height:4px"></div><div class="tag">4</div></div>
  <div class="box"><div class="sp" style="height:8px"></div><div class="tag">8</div></div>
  <div class="box"><div class="sp" style="height:12px"></div><div class="tag">12</div></div>
  <div class="box"><div class="sp" style="height:16px"></div><div class="tag">16</div></div>
  <div class="box"><div class="sp" style="height:24px"></div><div class="tag">24</div></div>
  <div class="box"><div class="sp" style="height:32px"></div><div class="tag">32</div></div>
  <div class="box"><div class="sp" style="height:48px"></div><div class="tag">48</div></div>
  <div class="box"><div class="sp" style="height:64px"></div><div class="tag">64</div></div>
  <div class="box"><div class="sp" style="height:80px"></div><div class="tag">80 · section</div></div>
</div>
</body></html>
