<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:22px;font-family:Inter,sans-serif;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn{padding:14px 28px;border-radius:999px;font:600 14px/1 Inter;border:none;cursor:pointer;}
.primary{background:#2563eb;color:#fff;}
.secondary{background:transparent;color:#fff;border:1px solid #374151;}
.cta{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;padding:16px 32px;font-size:16px;}
.filter{padding:8px 16px;border-radius:999px;background:#1f2937;color:#e5e7eb;font:500 13px/1 Inter;border:none;}
.filter.active{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;}
.resume{background:#2563eb;color:#fff;padding:8px 16px;font-size:13px;}
</style></head><body>
<div class="row" style="margin-bottom:14px;">
  <button class="btn primary">View My Work</button>
  <button class="btn secondary">Get In Touch</button>
  <button class="btn cta">Start a Conversation</button>
  <button class="btn resume">Resume</button>
</div>
<div class="row">
  <button class="filter active">All Projects</button>
  <button class="filter">AI/ML</button>
  <button class="filter">Web Dev</button>
  <button class="filter">Other</button>
</div>
</body></html>
