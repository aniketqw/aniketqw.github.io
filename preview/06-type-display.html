<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#0a0a0a;color:#fff;padding:20px;font-family:var(--font-display);}
.row{display:flex;align-items:baseline;gap:16px;margin-bottom:10px;}
.tok{font:600 11px/1 'JetBrains Mono',monospace;color:#666680;width:90px;flex-shrink:0;}
.hero{font:900 72px/.95 Inter;letter-spacing:-.02em;}
.h2{font:700 40px/1.1 Inter;letter-spacing:-.01em;}
.h3{font:700 22px/1.3 Inter;}
.grad{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
</style></head><body>
<div class="row"><div class="tok">hero / 72</div><div class="hero">Hi, I'm <span class="grad">Aniket</span></div></div>
<div class="row"><div class="tok">h2 / 40</div><div class="h2">Featured <span class="grad">Projects</span></div></div>
<div class="row"><div class="tok">h3 / 22</div><div class="h3">Lead AI Engineer</div></div>
</body></html>
