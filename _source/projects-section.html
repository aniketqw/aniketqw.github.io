<!-- 
  DROP-IN REPLACEMENT for the <section id="projects"> block in your index.html
  
  This version reads from projects.json (auto-generated by the GitHub Action).
  The rest of your index.html stays exactly the same.
-->

<!-- Projects Section -->
<section id="projects" class="py-20 relative lazy-section">
  <div class="container mx-auto px-6">
    <div class="max-w-6xl mx-auto">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 reveal">
        Featured <span class="gradient-text">Projects</span>
      </h2>
      <p class="text-gray-400 mb-3 reveal" style="animation-delay: 0.1s">
        Explore my latest work in AI, machine learning, and full-stack development
      </p>
      <p class="text-xs text-gray-600 mb-8 reveal mono" id="projects-meta" style="animation-delay: 0.15s"></p>

      <!-- Filter Buttons -->
      <div id="project-filters" class="flex flex-wrap gap-2 mb-12 reveal" style="animation-delay: 0.2s">
        <button class="filter-button active px-4 py-2 bg-gray-800 rounded-full text-sm hover:bg-gray-700 transition-all" onclick="filterProjects('all', this)">All Projects</button>
        <button class="filter-button px-4 py-2 bg-gray-800 rounded-full text-sm hover:bg-gray-700 transition-all" onclick="filterProjects('ai', this)">AI/ML</button>
        <button class="filter-button px-4 py-2 bg-gray-800 rounded-full text-sm hover:bg-gray-700 transition-all" onclick="filterProjects('web', this)">Web Dev</button>
        <button class="filter-button px-4 py-2 bg-gray-800 rounded-full text-sm hover:bg-gray-700 transition-all" onclick="filterProjects('other', this)">Other</button>
      </div>

      <!-- Projects Grid -->
      <div id="projects-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Skeleton placeholders while loading -->
        <div class="skeleton rounded-2xl h-80"></div>
        <div class="skeleton rounded-2xl h-80"></div>
        <div class="skeleton rounded-2xl h-80"></div>
      </div>

      <!-- Load More -->
      <div class="text-center mt-12 reveal-scale" style="animation-delay: 0.5s">
        <button id="load-more-btn" class="magnetic glow px-8 py-3 bg-gray-800 rounded-full hover:bg-gray-700 transition-all" style="display:none">
          Load More Projects
        </button>
      </div>
    </div>
  </div>
</section>

<style>
  .filter-button.active {
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%) !important;
    color: white;
  }
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>

<script>
(function () {
  /* ── Config ─────────────────────────────────────────────────────────────── */
  const PROJECTS_JSON = 'projects.json';
  const PER_PAGE      = 6;

  const STATUS_COLORS = {
    Live:   'bg-green-900/30 text-green-400',
    Demo:   'bg-blue-900/30 text-blue-400',
    Beta:   'bg-yellow-900/30 text-yellow-400',
  };
  const TAG_COLORS = [
    'bg-blue-900/30 text-blue-400',
    'bg-purple-900/30 text-purple-400',
    'bg-green-900/30 text-green-400',
    'bg-yellow-900/30 text-yellow-400',
    'bg-red-900/30 text-red-400',
  ];

  /* ── State ──────────────────────────────────────────────────────────────── */
  let allProjects    = [];
  let currentFilter  = 'all';
  let visibleCount   = PER_PAGE;

  /* ── Fetch projects.json ─────────────────────────────────────────────────── */
  async function init() {
    try {
      const r = await fetch(PROJECTS_JSON + '?v=' + Date.now());
      if (!r.ok) throw new Error('projects.json not found');
      const data = await r.json();

      allProjects = data.projects || [];

      // Show generated-at meta
      if (data.generated_at) {
        const d = new Date(data.generated_at);
        document.getElementById('projects-meta').textContent =
          `Auto-synced from GitHub · last updated ${d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })}`;
      }

      renderProjects();
    } catch (e) {
      console.warn('projects.json not found, falling back to embedded data:', e.message);
      allProjects = FALLBACK_PROJECTS;
      renderProjects();
    }
  }

  /* ── Render ─────────────────────────────────────────────────────────────── */
  function renderProjects() {
    const filtered = filterList(allProjects, currentFilter);
    const slice    = filtered.slice(0, visibleCount);
    const grid     = document.getElementById('projects-grid');
    const moreBtn  = document.getElementById('load-more-btn');

    grid.innerHTML = slice.length
      ? slice.map((p, i) => projectCard(p, i)).join('')
      : `<div class="col-span-3 text-center py-20 text-gray-500">No projects in this category yet.</div>`;

    // Show / hide Load More
    if (visibleCount < filtered.length) {
      moreBtn.style.display = '';
      moreBtn.textContent   = 'Load More Projects';
      moreBtn.disabled      = false;
      moreBtn.onclick       = () => { visibleCount += PER_PAGE; renderProjects(); };
    } else {
      moreBtn.style.display = filtered.length > PER_PAGE ? '' : 'none';
      moreBtn.textContent   = 'All Projects Loaded';
      moreBtn.disabled      = true;
    }

    // Trigger scroll animations
    setTimeout(() => {
      document.querySelectorAll('.reveal-scale:not(.active)').forEach(el => el.classList.add('active'));
    }, 80);
  }

  function filterList(list, f) {
    const sorted = [...list].sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
    if (f === 'all') return sorted;
    return sorted.filter(p => p.category === f);
  }

  /* ── Card ────────────────────────────────────────────────────────────────── */
  function projectCard(p, i) {
    const statusCls = STATUS_COLORS[p.status] || 'bg-gray-900/30 text-gray-400';
    const tags = (p.tags || []).slice(0, 4)
      .map((t, j) => `<span class="text-xs px-3 py-1 ${TAG_COLORS[j % TAG_COLORS.length]} rounded-full">${t}</span>`)
      .join('');

    const featuredBadge = p.featured
      ? `<div class="absolute top-3 right-3 z-20">
           <span class="text-xs px-2 py-1 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-full">Featured</span>
         </div>`
      : '';

    const ghLink = p.github && p.github !== p.link
      ? `<a href="${p.github}" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1 text-sm">
           <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
             <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
           </svg>
           Code
         </a>`
      : '';

    const imgSrc = p.image || `https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=60`;

    const extraMeta = p.stars > 0
      ? `<span class="text-xs text-gray-500 ml-auto">★ ${p.stars}</span>`
      : '';

    return `
<div class="project-card bg-gray-900/50 backdrop-blur border ${p.featured ? 'border-blue-800/50' : 'border-gray-800'} rounded-2xl overflow-hidden group reveal-scale" style="position:relative;animation-delay:${i * 0.08}s">
  ${featuredBadge}
  <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="block relative z-10">
    <div class="aspect-video overflow-hidden bg-gray-800">
      <img src="${imgSrc}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
           loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=60'">
    </div>
  </a>
  <div class="p-6 relative z-10">
    <div class="flex items-center justify-between mb-2">
      <h3 class="text-xl font-bold leading-tight">${p.title}</h3>
      <span class="text-xs px-2 py-1 ${statusCls} rounded-full flex-shrink-0 ml-2">${p.status}</span>
    </div>
    <p class="text-gray-400 mb-4 text-sm line-clamp-2">${p.description}</p>
    <div class="flex flex-wrap gap-2 mb-4">${tags}</div>
    <div class="flex gap-4 items-center">
      <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-2 text-sm">
        View Project
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
        </svg>
      </a>
      ${ghLink}
      ${extraMeta}
    </div>
  </div>
</div>`;
  }

  /* ── Filter button handler (global) ──────────────────────────────────────── */
  window.filterProjects = function (cat, btn) {
    currentFilter = cat;
    visibleCount  = PER_PAGE;
    document.querySelectorAll('.filter-button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProjects();
  };

  /* ── Fallback data (used if projects.json doesn't exist yet) ─────────────── */
  const FALLBACK_PROJECTS = [
    {
      id: 'healthy-ai-expert', title: 'Healthy AI Expert', category: 'ai', status: 'Live',
      description: 'AI-powered personalized wellness recommendation platform using NLP and machine learning.',
      image: 'images/healthyAiExpert.png',
      link: 'https://huggingface.co/spaces/Phoenix21/HealthyAiExpert', github: null,
      tags: ['Python', 'NLP', 'TensorFlow'], featured: true, stars: 0,
    },
    {
      id: 'emotion-detection', title: 'Emotion Detection', category: 'ai', status: 'Demo',
      description: 'Deep learning model for accurate facial keypoint detection using CNN and ResNet architectures.',
      image: 'https://images.unsplash.com/photo-1507146426996-ef05306b995a?auto=format&fit=crop&w=800&q=60',
      link: 'https://github.com/aniketqw/EmotionKeyFacialPointDetection',
      github: 'https://github.com/aniketqw/EmotionKeyFacialPointDetection',
      tags: ['Python', 'CNN', 'ResNet'], featured: true, stars: 0,
    },
    {
      id: 'github-repo-analyzer', title: 'GitHub Repository Analyzer', category: 'web', status: 'Live',
      description: 'React application for analyzing GitHub repositories with AI-powered natural language search.',
      image: 'images/GithubRepoAnalyzer.png',
      link: 'https://github-repo-analyzer1-latest.onrender.com/', github: null,
      tags: ['React', 'Docker', 'AI'], featured: true, stars: 0,
    },
    {
      id: 'ainews-v2', title: 'AiNews V2', category: 'ai', status: 'Live',
      description: 'Generates daily AI news blog by searching latest articles and categorizing them into sections.',
      image: 'https://images.unsplash.com/photo-1504711434969-e65cc6a4a00e?auto=format&fit=crop&w=800&q=60',
      link: 'https://huggingface.co/spaces/Phoenix21/AiNewsV2', github: null,
      tags: ['Python', 'NLP', 'Web Scraping'], featured: false, stars: 0,
    },
    {
      id: 'arm-qa-chatbot', title: 'ARM Based QA Chatbot', category: 'ai', status: 'Live',
      description: 'Advanced retrieval-augmented generation (RAG) based question-answering chatbot.',
      image: 'https://images.unsplash.com/photo-1531746790731-6c087fecd65a?auto=format&fit=crop&w=800&q=60',
      link: 'https://huggingface.co/spaces/Phoenix21/ARM_BASED_QA_CHATBOT', github: null,
      tags: ['Python', 'LangChain', 'RAG'], featured: false, stars: 0,
    },
    {
      id: 'websocket_mcqs1', title: 'Realtime MCQ Battle', category: 'web', status: 'Live',
      description: 'WebSocket-powered multiplayer quiz platform with real-time scoring and live leaderboards.',
      image: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=60',
      link: 'https://github.com/aniketqw/websocket_mcqs1',
      github: 'https://github.com/aniketqw/websocket_mcqs1',
      tags: ['Node.js', 'WebSocket', 'React', 'MongoDB'], featured: true, stars: 0,
    },
  ];

  /* ── Boot ────────────────────────────────────────────────────────────────── */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
